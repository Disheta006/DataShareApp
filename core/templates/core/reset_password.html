{% extends 'base.html' %}
{% block content %}

<div class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-lg max-w-md w-full overflow-hidden">
        <div class="bg-linear-to-r from-blue-600 to-orange-500 text-center py-10 px-6">
            <div class="flex justify-center mb-4">
                <div class="bg-white/20 text-2xl p-4 rounded-full">
                    🔐
                </div>
            </div>
            <h2 class="text-2xl md:text-3xl font-bold text-white">Reset Password</h2>
        </div>
        <div class="flex justify-center space-x-2 mt-6">
            <div class="w-8 h-2 rounded-full bg-gray-200"></div>
            <div class="w-8 h-2 rounded-full bg-gray-200"></div>
            <div class="w-8 h-2 rounded-full bg-gray-200"></div>
        </div>
        <div class="p-6">
            <div class="bg-blue-50 p-4 ronded-lg text-sm text-gray-700 mb-6">
                ✅ Code verified! Create a new strong password.
            </div>
            <form method="post">
                {% csrf_token %}
                <label class="block text-sm font-medium mt-4 mb-2">
                    New Password
                </label>
                <input type="password" name="password" placeholder="Create a strong password" class="w-full border rounded-lg px-4 py-3 text-center tracking-widest text-lg focus:ring-2 focus:ring-blue-500">
                <label class="block text-sm font-medium mt-4 mb-2">
                    Confirm Password
                </label>
                <input type="password" name="confirm_password" placeholder="Re-enter your password" class="w-full border rounded-lg px-4 py-3 text-center tracking-widest text-lg focus:ring-2 focus:ring-blue-500">
                <button class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold">
                Reset Password
            </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
