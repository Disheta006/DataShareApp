{% extends "base.html" %}
{% block content %}
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-6xl bg-white rounded-2xl shadow-xl overflow-hidden grid grid-cols-1 lg:grid-cols-2">

            <div class="hidden lg:flex flex-col justify-between bg-gradient-to-br from-orange-500 to-orange-600 text-white p-12">
                <div>
                    <h2 class="text-3xl font-bold mb-8 flex items-center gap-2">📱 DataShare</h2>
                    <h1 class="text-4xl font-bold mb-4">Welcome Back!</h1>
                    <p class="text-lg opacity-90">Log in to continue transferring mobile data instantly and securely.</p>
                </div>
                <div class="grid grid-cols-2 gap-6 mt-10">
                    <div class="bg-white/10 backdrop-blur-md p-6 rounded-xl">
                        <h3 class="text-2xl font-bold">2.4M+</h3>
                        <p class="text-sm opacity-80">Active Users</p>
                    </div>
                    <div class="bg-white/10 backdrop-blur-md p-6 rounded-xl">
                        <h3 class="text-2xl font-bold">99.9%</h3>
                        <p class="text-sm opacity-80">Uptime</p>
                    </div>
                    <div class="bg-white/10 backdrop-blur-md p-6 rounded-xl">
                        <h3 class="text-2xl font-bold">&lt;3s</h3>
                        <p class="text-sm opacity-80">Average Transfer Time</p>
                    </div>
                    <div class="bg-white/10 backdrop-blur-md p-6 rounded-xl">
                        <h3 class="text-2xl font-bold">$0</h3>
                        <p class="text-sm opacity-80">Hidden Fees</p>
                    </div>
                </div>
                <p class="text-sm opacity-80 mt-8">© 2024 DataShare. All rights reserved.</p>
            </div>

            
        </div>
    </div>
{% endblock %}
